name: Gerar Release Completa

on:
  push:
    branches: [ "main" ] # Roda sempre que você mandar código para a main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Configura o Flutter (Baseado no seu pubspec)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.1' # A versão que está no seu arquivo
          channel: 'stable'

      # 2. Configura o Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Instala as dependências do Flutter e Python
      - name: Instalar Dependências
        run: |
          flutter pub get
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pymysql sqlalchemy fastapi uvicorn pymysql

      # 4. Compila o Visual (Flutter)
      - name: Build Flutter Windows
        run: flutter build windows

      # 5. Compila o Motor (Python)
      - name: Build Python Server
        run: pyinstaller --onedir servidor.py

      # 6. ORGANIZAÇÃO (A parte que estava te dando raiva!)
      - name: Organizar Pasta de Release
        run: |
          mkdir Final_Release
          # Move o Flutter
          xcopy /E /I build\windows\runner\Release\* Final_Release\sistema\
          # Move o Python
          copy dist\servidor\servidor.exe Final_Release\servidor\
          # COPIA A PASTA LIB (Para não dar erro de ModuleNotFoundError)
          xcopy /E /I lib\* Final_Release\servidor\lib\
          # Copia os arquivos de apoio
          copy launcher.vbs Final_Release\
          copy .env Final_Release\

      # 7. Entrega o arquivo pronto para você baixar
      - name: Upload da Release
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Estoque-Pronto-Para-Uso
          path: Final_Release/
