name: Gerar Release Completa

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Configura o Flutter (Sem versão fixa para não dar erro!)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Ele vai pegar a mais nova que funciona

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          flutter pub get
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pymysql sqlalchemy fastapi uvicorn

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Build Python Server
        run: pyinstaller --onedir servidor.py

      - name: 📦 ORGANIZAÇÃO FINAL
        run: |
          mkdir Pacote_Final
          # Copia o Flutter
          xcopy /E /I build\windows\x64\runner\Release\* Pacote_Final\
          # Copia o Servidor
          copy dist\servidor\servidor.exe Pacote_Final\
          # Copia a Pasta LIB (Crucial!)
          xcopy /E /I lib Pacote_Final\lib\
          # Copia o Launcher
          copy launcher.vbs Pacote_Final\
          # Cria um .env de segurança
          if not exist Pacote_Final\.env ( echo DB_HOST=localhost > Pacote_Final\.env )

      - name: 🚀 Upload do Sistema
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Estoque-Pronto
          path: Pacote_Final/
