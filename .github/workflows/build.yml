name: Gerar Release Completa

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          flutter pub get
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pymysql sqlalchemy fastapi uvicorn python-dotenv

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Build Python Server
        shell: cmd
        run: |
          copy lib\servidor.py .
          :: Compila com a lib embutida e todas as dependências
          pyinstaller --onefile --add-data "lib;lib" servidor.py

      - name: 📦 ORGANIZAÇÃO FINAL
        shell: cmd
        run: |
          mkdir Pacote_Final
          :: 1. Copia o Flutter
          xcopy /E /I build\windows\x64\runner\Release\* Pacote_Final\
          
          :: 2. Copia o Servidor (Independente e com tudo dentro)
          copy dist\servidor.exe Pacote_Final\
          
          :: 3. Copia os arquivos extras
          if exist launcher.vbs copy launcher.vbs Pacote_Final\
          if exist .env copy .env Pacote_Final\
          if exist notas.db copy notas.db Pacote_Final\

      - name: 🚀 Upload do Sistema
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Estoque
          path: Pacote_Final/
