name: Gerar Release Completa

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.1' 
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          flutter pub get
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pymysql sqlalchemy fastapi uvicorn

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Build Python Server
        run: pyinstaller --onedir servidor.py

      - name: 📦 ORGANIZAÇÃO FINAL (Tudo na mesma pasta)
        run: |
          mkdir Pacote_Final
          # 1. Copia o Flutter (executável e pastas de dados)
          xcopy /E /I build\windows\x64\runner\Release\* Pacote_Final\
          
          # 2. Copia o servidor.exe
          copy dist\servidor\servidor.exe Pacote_Final\
          
          # 3. Copia a PASTA LIB (O que estava faltando antes!)
          xcopy /E /I lib Pacote_Final\lib\
          
          # 4. Copia o Launcher e tenta criar um .env básico se não existir
          copy launcher.vbs Pacote_Final\
          if not exist Pacote_Final\.env ( echo DB_HOST=localhost > Pacote_Final\.env )

      - name: 🚀 Upload do Sistema
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Estoque-Pronto
          path: Pacote_Final/
