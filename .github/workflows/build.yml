name: Gerar Release Completa

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.11.1' 
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          flutter pub get
          python -m pip install --upgrade pip
          pip install pyinstaller cryptography pymysql sqlalchemy fastapi uvicorn

      - name: Build Flutter Windows
        run: flutter build windows --release

      - name: Build Python Server
        run: pyinstaller --onedir servidor.py

      - name: 📦 ORGANIZAÇÃO FINAL (Tudo na Raiz)
        run: |
          mkdir Pacote_Final
          # 1. Pega os arquivos do Flutter e joga na raiz do pacote
          xcopy /E /I build\windows\runner\Release\* Pacote_Final\
          
          # 2. Pega o servidor.exe e joga na raiz
          copy dist\servidor\servidor.exe Pacote_Final\
          
          # 3. CRUCIAL: Tenta copiar a pasta LIB (Se falhar, o build para aqui)
          if exist lib ( xcopy /E /I lib Pacote_Final\lib\ ) else ( echo "ERRO: Pasta lib nao encontrada!" && exit 1 )
          
          # 4. Copia os arquivos de configuração (Se existirem)
          if exist launcher.vbs ( copy launcher.vbs Pacote_Final\ )
          if exist .env ( copy .env Pacote_Final\ )

      - name: 🚀 Upload do Sistema Pronto
        uses: actions/upload-artifact@v4
        with:
          name: Sistema-Estoque-v1-COMPLETO
          path: Pacote_Final/
