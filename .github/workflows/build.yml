name: Gerar Executáveis Windows
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build windows

      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: |
          pip install pyinstaller fastapi uvicorn sqlalchemy pymysql cryptography pydantic-settings
          pyinstaller --noconsole --onefile lib/servidor.py

      - name: Disponibilizar arquivos
        uses: actions/upload-artifact@v3
        with:
          name: SistemaEstoque-Windows
          path: |
            build/windows/x64/runner/Release/
            dist/servidor.exe